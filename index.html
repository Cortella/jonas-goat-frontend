<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Default meta — react-helmet-async overrides per page -->
    <title>Jonas Goat — Vantagem matemática sobre as casas de apostas</title>
    <meta
      name="description"
      content="Jonas Goat usa três modelos estatísticos rodando em ensemble (Dixon-Coles, ELO, Bayesian) para encontrar value bets reais em odds de bookmakers. Não é palpite — é matemática aplicada às Top 5 ligas europeias e à Copa do Mundo 2026."
    />
    <meta name="keywords" content="value bets, previsões de futebol, odds, ensemble, Dixon-Coles, ELO, apostas esportivas, futebol brasil" />
    <meta name="author" content="Jonas Goat" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://www.jonasgoat.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Jonas Goat" />
    <meta property="og:url" content="https://www.jonasgoat.com/" />
    <meta property="og:title" content="Jonas Goat — Vantagem matemática sobre o mercado de apostas" />
    <meta
      property="og:description"
      content="Três modelos estatísticos em ensemble identificam value bets onde a probabilidade real é maior que a implícita nas odds. Análise transparente de Premier League, La Liga, Bundesliga, Serie A, Ligue 1, UCL e Copa 2026."
    />
    <meta property="og:image" content="https://www.jonasgoat.com/logo.png" />
    <meta property="og:image:alt" content="Jonas Goat" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jonas Goat — Vantagem matemática sobre o mercado" />
    <meta
      name="twitter:description"
      content="Identifica value bets em odds reais com 3 modelos estatísticos. Sem palpite, sem hype."
    />
    <meta name="twitter:image" content="https://www.jonasgoat.com/logo.png" />

    <!-- Performance: preconnect to fonts only when needed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme color -->
    <meta name="theme-color" content="#0d1117" />

    <!-- Structured data: organization + website (helps Google's Knowledge Graph) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.jonasgoat.com/#organization",
            "name": "Jonas Goat",
            "url": "https://www.jonasgoat.com/",
            "logo": "https://www.jonasgoat.com/logo.png",
            "description": "Plataforma de previsões de futebol com modelos estatísticos para identificar value bets.",
            "sameAs": []
          },
          {
            "@type": "WebSite",
            "@id": "https://www.jonasgoat.com/#website",
            "url": "https://www.jonasgoat.com/",
            "name": "Jonas Goat",
            "publisher": { "@id": "https://www.jonasgoat.com/#organization" },
            "inLanguage": "pt-BR",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://www.jonasgoat.com/predictions?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "Product",
            "name": "Jonas Goat — assinatura Pro",
            "description": "Análises e previsões com value bets para Top 5 ligas + UCL + Copa do Mundo 2026.",
            "image": "https://www.jonasgoat.com/logo.png",
            "brand": { "@id": "https://www.jonasgoat.com/#organization" },
            "offers": {
              "@type": "Offer",
              "priceCurrency": "BRL",
              "price": "49.00",
              "url": "https://www.jonasgoat.com/precos",
              "availability": "https://schema.org/InStock",
              "priceValidUntil": "2026-12-31"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
