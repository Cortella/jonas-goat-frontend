<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Default title — react-helmet-async sobrescreve por página. description,
         canonical e og:url/title/description NÃO ficam aqui de propósito: são
         definidos pelo <Seo> por página (e bakeados no prerender), senão ficam
         DUPLICADOS/conflitantes nas rotas pré-renderizadas. -->
    <title>Jonas Goat — Vantagem matemática sobre as casas de apostas</title>
    <meta name="keywords" content="value bets, previsões de futebol, odds, ensemble, Dixon-Coles, ELO, apostas esportivas, futebol brasil" />
    <meta name="author" content="Jonas Goat" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph (genéricos; og:url/title/description vêm do <Seo>) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Jonas Goat" />
    <meta property="og:image" content="https://www.jonasgoat.com/logo.png" />
    <meta property="og:image:alt" content="Jonas Goat" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jonas Goat — Vantagem matemática sobre o mercado" />
    <meta
      name="twitter:description"
      content="Identifica value bets em odds reais com 3 modelos estatísticos. Sem palpite, sem hype."
    />
    <meta name="twitter:image" content="https://www.jonasgoat.com/logo.png" />

    <!-- Performance: preconnect to fonts only when needed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme color -->
    <meta name="theme-color" content="#0d1117" />

    <!-- Structured data: organization + website (helps Google's Knowledge Graph) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.jonasgoat.com/#organization",
            "name": "Jonas Goat",
            "url": "https://www.jonasgoat.com/",
            "logo": "https://www.jonasgoat.com/logo.png",
            "description": "Plataforma de previsões de futebol com modelos estatísticos para identificar value bets.",
            "sameAs": []
          },
          {
            "@type": "WebSite",
            "@id": "https://www.jonasgoat.com/#website",
            "url": "https://www.jonasgoat.com/",
            "name": "Jonas Goat",
            "publisher": { "@id": "https://www.jonasgoat.com/#organization" },
            "inLanguage": "pt-BR",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://www.jonasgoat.com/predictions?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
